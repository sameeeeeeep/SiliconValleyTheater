<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voice Lab — SiliconValley Theater</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --orange: #d29922; --red: #f85149; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 24px; max-width: 960px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: var(--dim); margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.cloned { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.pending { background: rgba(210,153,34,0.15); color: var(--orange); }
  .badge.running { background: rgba(88,166,255,0.15); color: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .voice-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .voice-card .name { font-weight: 600; font-size: 15px; text-transform: capitalize; }
  .voice-card .meta { color: var(--dim); font-size: 12px; margin-top: 4px; }
  .score-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .score-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .score-bar .fill.low { background: var(--red); }
  .score-bar .fill.mid { background: var(--orange); }
  .score-bar .fill.high { background: var(--green); }
  .score-label { font-size: 11px; color: var(--dim); margin-top: 4px; display: flex; justify-content: space-between; }
  .btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; color: var(--dim); cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.05); }
  .upload-zone input[type=file] { display: none; }
  .log-box { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--dim); max-height: 120px; overflow-y: auto; margin-top: 8px; white-space: pre; line-height: 1.6; }
  .phase { font-size: 11px; color: var(--accent); margin-top: 4px; }
  input[type=text], input[type=number] { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; }
  .upload-form { display: none; margin-top: 16px; }
  .upload-form.active { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; color: var(--dim); }
</style>
</head>
<body>
<h1>Voice Lab</h1>
<p class="subtitle">Clone voices for SiliconValley Theater &middot; Drop WAVs, monitor progress, preview results</p>

<div class="card">
  <h2>Add New Voice</h2>
  <div class="upload-zone" id="dropzone">
    <input type="file" id="fileInput" accept=".wav,.mp3,.m4a">
    <p style="font-size: 20px; margin-bottom: 8px;">drop</p>
    <p>Drop a WAV file here or click to browse</p>
    <p style="font-size: 12px; margin-top: 4px;">(3-30 seconds of clear speech, minimal background noise)</p>
  </div>
  <div class="upload-form" id="uploadForm">
    <div class="form-group">
      <label>Voice Name</label>
      <input type="text" id="voiceName" placeholder="e.g. gilfoyle">
    </div>
    <div class="form-group">
      <label>Target Score</label>
      <input type="number" id="targetScore" value="0.90" step="0.05" min="0.5" max="0.99" style="width:80px">
    </div>
    <div class="form-group">
      <label>Steps</label>
      <input type="number" id="maxSteps" value="2000" step="500" min="500" max="10000" style="width:90px">
    </div>
    <button class="btn primary" id="cloneBtn">Clone</button>
    <button class="btn" id="cancelBtn">Cancel</button>
  </div>
</div>

<div class="card">
  <h2>Voices</h2>
  <div id="voiceGrid" class="voice-grid">
    <div style="color: var(--dim); grid-column: 1/-1; text-align: center; padding: 20px;">Loading...</div>
  </div>
</div>

<script>
(function() {
  let selectedFile = null;
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const uploadForm = document.getElementById('uploadForm');
  const grid = document.getElementById('voiceGrid');

  // Click to browse
  dropzone.addEventListener('click', function() { fileInput.click(); });

  // Drag & drop
  dropzone.addEventListener('dragover', function(e) { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('dragover'); });
  dropzone.addEventListener('drop', function(e) {
    e.preventDefault(); dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', function() { if (fileInput.files.length) handleFile(fileInput.files[0]); });

  function handleFile(file) {
    selectedFile = file;
    var name = file.name.replace(/\.wav$/i, '').replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
    document.getElementById('voiceName').value = name;
    var info = document.createElement('div');
    info.style.cssText = 'text-align:center';
    var check = document.createElement('p');
    check.style.fontSize = '20px';
    check.textContent = 'Selected';
    var detail = document.createElement('p');
    detail.textContent = file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)';
    info.appendChild(check);
    info.appendChild(detail);
    while (dropzone.childNodes.length > 1) dropzone.removeChild(dropzone.lastChild);
    dropzone.appendChild(info);
    uploadForm.classList.add('active');
  }

  function resetUpload() {
    selectedFile = null;
    uploadForm.classList.remove('active');
    // Reset dropzone content
    while (dropzone.childNodes.length > 1) dropzone.removeChild(dropzone.lastChild);
    var p1 = document.createElement('p');
    p1.style.cssText = 'font-size:20px;margin-bottom:8px';
    p1.textContent = 'drop';
    var p2 = document.createElement('p');
    p2.textContent = 'Drop a WAV file here or click to browse';
    dropzone.appendChild(p1);
    dropzone.appendChild(p2);
  }

  document.getElementById('cancelBtn').addEventListener('click', resetUpload);

  document.getElementById('cloneBtn').addEventListener('click', async function() {
    if (!selectedFile) return;
    var fd = new FormData();
    fd.append('file', selectedFile);
    fd.append('name', document.getElementById('voiceName').value);
    var res = await fetch('/voicelab/upload', { method: 'POST', body: fd });
    var data = await res.json();
    if (data.ok) { resetUpload(); refresh(); }
  });

  async function reclone(name) {
    var fd = new FormData();
    fd.append('name', name);
    fd.append('steps', '2000');
    fd.append('target', '0.90');
    await fetch('/voicelab/reclone', { method: 'POST', body: fd });
    refresh();
  }

  async function stopJob(jobId) {
    await fetch('/voicelab/stop/' + jobId, { method: 'POST' });
    refresh();
  }

  function playPreview(name) {
    var audio = new Audio('/voicelab/preview/' + name);
    audio.play();
  }

  // Expose to onclick handlers
  window._voicelab = { reclone: reclone, stopJob: stopJob, playPreview: playPreview };

  function renderVoices(voices, jobs) {
    // Clear grid
    while (grid.firstChild) grid.removeChild(grid.firstChild);

    if (!voices.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'color:var(--dim);grid-column:1/-1;text-align:center;padding:20px';
      empty.textContent = 'No voices yet. Upload a WAV to get started!';
      grid.appendChild(empty);
      return;
    }

    voices.forEach(function(v) {
      var job = v.active_job ? jobs[v.active_job] : null;
      var prog = (job && job.progress) ? job.progress : {};
      var score = prog.score || 0;

      var card = document.createElement('div');
      card.className = 'voice-card';

      // Header row
      var header = document.createElement('div');
      header.style.cssText = 'display:flex;justify-content:space-between;align-items:center';
      var nameEl = document.createElement('span');
      nameEl.className = 'name';
      nameEl.textContent = v.name;
      header.appendChild(nameEl);

      var badge = document.createElement('span');
      badge.className = 'badge';
      if (job && job.status === 'running') {
        badge.classList.add('running');
        badge.textContent = 'Cloning';
      } else if (v.has_tensor) {
        badge.classList.add('cloned');
        badge.textContent = 'Cloned';
      } else {
        badge.classList.add('pending');
        badge.textContent = 'No tensor';
      }
      header.appendChild(badge);
      card.appendChild(header);

      // Meta
      var meta = document.createElement('div');
      meta.className = 'meta';
      var metaText = v.wav_size_kb + ' KB ~ ' + v.wav_duration_s + 's';
      if (v.has_tensor) metaText += ' tensor: ' + v.tensor_size_kb + ' KB';
      meta.textContent = metaText;
      card.appendChild(meta);

      // Score bar
      if (score > 0) {
        var scoreBar = document.createElement('div');
        scoreBar.className = 'score-bar';
        var fill = document.createElement('div');
        fill.className = 'fill';
        fill.classList.add(score >= 0.85 ? 'high' : score >= 0.7 ? 'mid' : 'low');
        fill.style.width = Math.min(score * 100, 100) + '%';
        scoreBar.appendChild(fill);
        card.appendChild(scoreBar);

        var scoreLabel = document.createElement('div');
        scoreLabel.className = 'score-label';
        var sl1 = document.createElement('span');
        sl1.textContent = 'Similarity';
        var sl2 = document.createElement('span');
        sl2.textContent = score.toFixed(4);
        scoreLabel.appendChild(sl1);
        scoreLabel.appendChild(sl2);
        card.appendChild(scoreLabel);
      }

      // Phase
      if (job && job.status === 'running') {
        var phases = { starting: 'Starting...', generating_samples: 'Generating reference samples...', extracting_embedding: 'Extracting speaker embedding...', finding_preset: 'Finding best preset...', optimizing: 'Optimizing tensor...', done: 'Complete!' };
        var phase = document.createElement('div');
        phase.className = 'phase';
        phase.textContent = (phases[prog.phase] || prog.phase) + (prog.step > 0 ? ' Step ' + prog.step : '');
        card.appendChild(phase);
      }

      // Log box
      if (job && job.log_tail && job.log_tail.length) {
        var logBox = document.createElement('div');
        logBox.className = 'log-box';
        logBox.textContent = job.log_tail.join('\n');
        card.appendChild(logBox);
      }

      // Buttons
      var btnRow = document.createElement('div');
      btnRow.className = 'btn-row';
      if (v.has_tensor) {
        var previewBtn = document.createElement('button');
        previewBtn.className = 'btn';
        previewBtn.textContent = 'Preview';
        previewBtn.setAttribute('data-name', v.name);
        previewBtn.addEventListener('click', function() { playPreview(this.getAttribute('data-name')); });
        btnRow.appendChild(previewBtn);
      }
      if (job && job.status === 'running') {
        var stopBtn = document.createElement('button');
        stopBtn.className = 'btn danger';
        stopBtn.textContent = 'Stop';
        stopBtn.setAttribute('data-job', v.active_job);
        stopBtn.addEventListener('click', function() { stopJob(this.getAttribute('data-job')); });
        btnRow.appendChild(stopBtn);
      } else {
        var cloneBtn = document.createElement('button');
        cloneBtn.className = 'btn';
        cloneBtn.textContent = v.has_tensor ? 'Re-clone' : 'Clone';
        cloneBtn.setAttribute('data-name', v.name);
        cloneBtn.addEventListener('click', function() { reclone(this.getAttribute('data-name')); });
        btnRow.appendChild(cloneBtn);
      }
      card.appendChild(btnRow);

      grid.appendChild(card);
    });
  }

  async function refresh() {
    try {
      var res = await fetch('/voicelab/status');
      var data = await res.json();
      renderVoices(data.voices, data.jobs);
    } catch(e) { console.error(e); }
  }

  // Auto-refresh every 3s
  refresh();
  setInterval(refresh, 3000);
})();
</script>
</body>
</html>
